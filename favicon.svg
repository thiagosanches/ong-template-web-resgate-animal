<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#6366f1" rx="20"/>
  
  <!-- Main paw pad -->
  <ellipse cx="50" cy="60" rx="18" ry="22" fill="#ffffff"/>
  
  <!-- Top left toe -->
  <ellipse cx="30" cy="35" rx="10" ry="14" fill="#ffffff" transform="rotate(-20 30 35)"/>
  
  <!-- Top middle toe -->
  <ellipse cx="50" cy="28" rx="10" ry="14" fill="#ffffff"/>
  
  <!-- Top right toe -->
  <ellipse cx="70" cy="35" rx="10" ry="14" fill="#ffffff" transform="rotate(20 70 35)"/>
  
  <!-- Bottom right toe -->
  <ellipse cx="68" cy="52" rx="8" ry="12" fill="#ffffff" transform="rotate(10 68 52)"/>
</svg>
